services:
  - type: worker
    name: insightflow-scheduler
    env: python
    buildCommand: pip install -r requirements_render.txt
    startCommand: python render_scheduler.py
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false          # set manually in Render dashboard
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard
      - key: FETCH_INTERVAL
        value: 30